[build]
  command = "npm run build"
  publish = "build"
  edge_functions = "netlify/edge-functions"

[[edge_functions]]
  function = "auth"
  path = "/*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"

[[edge_functions]]
  function = "supabase-proxy"
  path = "/api/supabase/*"

  [[edge_functions]]
  function = "anthropic-proxy"
  path = "/api/anthropic"